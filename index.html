<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking - Paiement</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#fff;
    width:90%;
    max-width:350px;
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.header{font-size:22px;font-weight:bold;}
.place{color:#64748b;margin:10px 0;}
.price{font-size:36px;font-weight:800;color:#e11d48;margin:20px 0;}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:#fff;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
}

.modal-content{
    background:#fff;
    margin:15% auto;
    width:90%;
    max-width:350px;
    padding:20px;
    border-radius:20px;
}

.card{
    background:#1e293b;
    color:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">🅿️ Smart Parking</div>
    <div class="place" id="placeInfo"></div>
    <div class="price" id="price"></div>
    <button onclick="openModal()">Payer</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">

        <h3>Paiement sécurisé</h3>

        <div class="card">
            <div id="num">•••• •••• •••• ••••</div>
            <div id="nomAff">NOM</div>
        </div>

        <input id="nom" placeholder="Nom">
        <input id="numCarte" placeholder="Numéro" maxlength="16">

        <div style="display:flex;gap:10px;">
            <input id="date" placeholder="MM/AA">
            <input id="cvv" placeholder="CVV" maxlength="3">
        </div>

        <button onclick="payer()" id="btn">Confirmer</button>

    </div>
</div>

<script>
// URL params
const params = new URLSearchParams(window.location.search);
const place = params.get("place") || "1";
const amount = params.get("amount") || "3.00";

document.getElementById("placeInfo").innerText = "Place n° " + place;
document.getElementById("price").innerText = amount + " DT";

// Modal
function openModal(){
    document.getElementById("modal").style.display="block";
}

// Card preview
document.getElementById("numCarte").oninput = (e)=>{
    let v = e.target.value;
    document.getElementById("num").innerText =
    v ? v.replace(/(.{4})/g,"$1 ") : "•••• •••• •••• ••••";
};

document.getElementById("nom").oninput = (e)=>{
    document.getElementById("nomAff").innerText =
    e.target.value || "NOM";
};

// Paiement
function payer(){

    let nom = nomEl.value;
    let num = numCarte.value;
    let date = dateEl.value;
    let cvv = cvvEl.value;

    if(nom=="" || num.length!=16 || cvv.length!=3){
        alert("Champs invalides");
        return;
    }

    btn.innerText="Traitement...";
    btn.disabled=true;

    // 🔴 IMPORTANT: normalement API backend هنا
    setTimeout(()=>{

        // Blynk trigger
        let token="YOUR_TOKEN"; // ⚠️ لازم يتحط في serveur
        let vPin="V"+(29+parseInt(place));

        fetch(`https://fra1.blynk.cloud/external/api/update?token=${token}&${vPin}=1`)
        .then(()=>{
            alert("Paiement OK");
            location.reload();
        })
        .catch(()=>{
            alert("Erreur serveur");
        });

    },1500);
}

// close modal
window.onclick=(e)=>{
    if(e.target==modal) modal.style.display="none";
};
</script>

</body>
</html>
