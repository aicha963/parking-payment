<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Smart Parking</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
        }

        h2 { margin-top: 0; color: #4a148c; }

        button {
            background: #6772e5;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #5469d4;
            transform: scale(1.02);
        }

        /* Modal / Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            color: black;
            margin: 5% auto;
            padding: 25px;
            width: 350px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Carte Bancaire Animée */
        .fake-card {
            background: linear-gradient(135deg, #1e1e1e, #434343);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-chip {
            width: 40px;
            height: 30px;
            background: #d4af37;
            border-radius: 5px;
        }

        .card-number {
            font-size: 20px;
            letter-spacing: 3px;
            font-family: 'Courier New', Courier, monospace;
        }

        .card-holder {
            text-transform: uppercase;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .status-msg {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🚗 Smart Parking</h2>
        <p id="info-place">Détection de la place...</p>
        <p>💰 Montant à régler : <strong>5.00 €</strong></p>
        <button onclick="ouvrirPopup()">RÉSERVER ET PAYER</button>
    </div>

    <div id="popup" class="modal">
        <div class="modal-content">
            <h3>Paiement Sécurisé</h3>

            <div class="fake-card">
                <div class="card-chip"></div>
                <div class="card-number" id="disp-num">•••• •••• •••• ••••</div>
                <div class="card-holder" id="disp-nom">NOM DU TITULAIRE</div>
            </div>

            <input type="text" id="nom" placeholder="Nom du titulaire" oninput="majVisuel()">
            <input type="text" id="carte" placeholder="Numéro de carte (16 chiffres)" maxlength="16" oninput="majVisuel()">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="date" placeholder="MM/AA" style="width: 40%;">
                <input type="text" id="cvv" placeholder="CVV" style="width: 40%;">
            </div>

            <button id="btn-confirmer" onclick="traiterPaiement()">CONFIRMER LE PAIEMENT</button>
            <p class="status-msg">Vos données sont cryptées et sécurisées.</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const token = "Al3eurLGTUbjWPAefx1mLEk_qoUaD7nc";
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('place');

        // Affichage de la place
        if(placeId) {
            document.getElementById('info-place').innerHTML = "Place sélectionnée : <strong>n° " + placeId + "</strong>";
        } else {
            document.getElementById('info-place').innerText = "Erreur : Aucune place sélectionnée.";
        }

        function ouvrirPopup() {
            if(!placeId) return alert("Erreur : ID de place manquant.");
            document.getElementById("popup").style.display = "block";
        }

        function fermerPopup() {
            document.getElementById("popup").style.display = "none";
        }

        function majVisuel() {
            let n = document.getElementById("carte").value;
            let m = document.getElementById("nom").value;
            document.getElementById("disp-num").innerText = n || "•••• •••• •••• ••••";
            document.getElementById("disp-nom").innerText = m || "NOM DU TITULAIRE";
        }

        function traiterPaiement() {
            const nom = document.getElementById("nom").value;
            const carte = document.getElementById("carte").value;
            const date = document.getElementById("date").value;
            const cvv = document.getElementById("cvv").value;

            if(!nom || !carte || !date || !cvv) {
                alert("⚠️ Veuillez remplir tous les champs de paiement.");
                return;
            }

            if(carte.length < 16) {
                alert("❌ Numéro de carte invalide (16 chiffres requis).");
                return;
            }

            // Désactiver le bouton pendant l'envoi
            const btn = document.getElementById("btn-confirmer");
            btn.innerText = "Traitement...";
            btn.disabled = true;

            // Appel API Blynk (V30 pour place 1, V31 pour place 2, etc.)
            const vPin = "V" + (29 + parseInt(placeId));
            const blynkUrl = `https://fra1.blynk.cloud/external/api/update?token=${token}&${vPin}=1`;

            fetch(blynkUrl)
                .then(response => {
                    if(response.ok) {
                        alert("✅ Paiement accepté ! Votre place est réservée.");
                        fermerPopup();
                        // Redirection vers une page de succès (facultatif)
                        // window.location.href = "merci.html"; 
                    } else {
                        alert("❌ Erreur de connexion avec le parking.");
                        btn.disabled = false;
                        btn.innerText = "CONFIRMER LE PAIEMENT";
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("❌ Erreur réseau.");
                    btn.disabled = false;
                });
        }

        // Fermer si on clique à côté du popup
        window.onclick = function(event) {
            if (event.target == document.getElementById("popup")) fermerPopup();
        }
    </script>

</body>
</html>
