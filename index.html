<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement Sécurisé - Smart Parking</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: #f0f2f5;
    padding: 20px;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

h1 {
    color: #1a73e8;
    font-size: 24px;
    margin-bottom: 10px;
}

.place {
    color: #666;
    font-size: 14px;
}

.price {
    font-size: 28px;
    font-weight: bold;
    margin: 20px 0;
    color: #d32f2f;
    background: #fff5f5;
    padding: 10px;
    border-radius: 10px;
}

/* Form */
.card-form {
    text-align: left;
    margin-top: 20px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-size: 14px;
    color: #666;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

.row {
    display: flex;
    gap: 10px;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    margin-top: 10px;
    font-weight: bold;
}

button:hover {
    background: #388E3C;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="box">

<h1>🅿️ SMART PARKING</h1>
<div class="place" id="placeInfo">Place...</div>

<p>Temps dépassé - Paiement requis</p>

<div class="price" id="price">Calcul...</div>

<div class="card-form">

<div class="input-group">
<label>Nom sur la carte</label>
<input type="text" id="nom" placeholder="Ex: Aicha Ben Salah">
</div>

<div class="input-group">
<label>Numéro de carte</label>
<input type="text" id="numCarte" maxlength="16" placeholder="0000 0000 0000 0000">
</div>

<div class="row">
<div class="input-group" style="flex:2;">
<label>Expiration</label>
<input type="text" id="date" placeholder="MM/YY">
</div>

<div class="input-group" style="flex:1;">
<label>CVV</label>
<input type="password" id="cvv" placeholder="123">
</div>
</div>

<button id="btn" onclick="payer()">CONFIRMER LE PAIEMENT</button>

</div>

<div class="footer">
🔒 Paiement sécurisé SSL <br>
Visa • Mastercard • Edinar
</div>

</div>

<script>

// PARAMS (important pour ESP32)
const params = new URLSearchParams(window.location.search);
const place = params.get("place") || "1";
const amount = params.get("amount") || "3.00";

document.getElementById("placeInfo").innerText = "Place n° " + place;
document.getElementById("price").innerText = amount + " DT";

// PAIEMENT
function payer(){

    const nom = document.getElementById("nom").value;
    const num = document.getElementById("numCarte").value;
    const date = document.getElementById("date").value;
    const cvv = document.getElementById("cvv").value;

    if(!nom || num.length < 16 || !date || cvv.length < 3){
        alert("Remplir correctement");
        return;
    }

    const btn = document.getElementById("btn");
    btn.innerText = "Traitement...";
    btn.disabled = true;

    const token = "Al3eurLGTUbjWPAefx1mLEk_qoUaD7nc";
    const vPin = "V" + (29 + parseInt(place));

    const url = `https://fra1.blynk.cloud/external/api/update?token=${token}&${vPin}=1`;

    setTimeout(() => {
        fetch(url)
        .then(() => {
            alert("Paiement réussi (" + amount + " DT)");
            location.reload();
        })
        .catch(() => {
            alert("Erreur");
            btn.innerText = "CONFIRMER LE PAIEMENT";
            btn.disabled = false;
        });
    }, 1500);
}

</script>

</body>
</html>
